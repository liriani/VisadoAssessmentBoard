    // ============================================================================

    const getNodeStyles_ext = (type) => {
        if (type === 'comment') return 'border-yellow-400 bg-yellow-100 text-yellow-900 shadow-yellow-100/50';
        if (type === 'questions') return 'border-purple-400 bg-purple-50 text-purple-900 shadow-purple-100/50';
        return getNodeStyles(type);
    };

    const getBadgeColor_ext = (type) => {
        if (type === 'comment') return 'bg-yellow-300 text-yellow-900';
        if (type === 'questions') return 'bg-purple-200 text-purple-800';
        return getBadgeColor(type);
    };

    // ============================================================================
    // ASSESSMENT QUESTIONS CARD COMPONENT
    // ============================================================================
    const AssessmentQuestionsCard = ({ node, lang, onMouseDown, onTouchStart, onDelete, isDraggingThis, onUpdateQuestions, onUpdateTitle }) => {
        const [inputText, setInputText] = useState('');
        const [questionType, setQuestionType] = useState('yes_no');
        const [expandedQ, setExpandedQ] = useState(null);
        const [newOptionText, setNewOptionText] = useState('');
        const [editingTitle, setEditingTitle] = useState(false);
        const [titleDraft, setTitleDraft] = useState(node.title);
        const importRef = useRef(null);
        const titleInputRef = useRef(null);

        const questions = node.questions || [];

        const questionTypeLabel = (t) => {
            if (t === 'yes_no') return lang === 'es' ? 'Sí/No' : 'Yes/No';
            if (t === 'multiple') return lang === 'es' ? 'Múltiple' : 'Multiple';
            if (t === 'single') return lang === 'es' ? 'Única' : 'Single';
            return t;
        };

        const questionTypeBadge = (t) => {
            if (t === 'yes_no') return 'bg-indigo-100 text-indigo-700';
            if (t === 'multiple') return 'bg-blue-100 text-blue-700';
            if (t === 'single') return 'bg-emerald-100 text-emerald-700';
            return 'bg-gray-100 text-gray-700';
        };

        const addQuestion = () => {
            const text = inputText.trim();
            if (!text) return;
            const newQ = {
                id: 'q_' + Date.now(),
                text,
                type: questionType,
                options: (questionType === 'multiple' || questionType === 'single') ? [] : null,
            };
            onUpdateQuestions(node.id, [...questions, newQ]);
            setInputText('');
        };

        const deleteQuestion = (qid) => {
            onUpdateQuestions(node.id, questions.filter(q => q.id !== qid));
            if (expandedQ === qid) setExpandedQ(null);
        };

        const addOption = (qid) => {
            const text = newOptionText.trim();
            if (!text) return;
            const updated = questions.map(q => {
                if (q.id !== qid) return q;
                const opts = q.options || [];
                return { ...q, options: [...opts, { id: 'opt_' + Date.now(), text, qualifies: true }] };
            });
            onUpdateQuestions(node.id, updated);
            setNewOptionText('');
        };

        const toggleQualifies = (qid, oid) => {
            const updated = questions.map(q => {
                if (q.id !== qid) return q;
                return { ...q, options: q.options.map(o => o.id === oid ? { ...o, qualifies: !o.qualifies } : o) };
            });
            onUpdateQuestions(node.id, updated);
        };

        const deleteOption = (qid, oid) => {
            const updated = questions.map(q => {
                if (q.id !== qid) return q;
                return { ...q, options: q.options.filter(o => o.id !== oid) };
            });
            onUpdateQuestions(node.id, updated);
        };

        const exportJSON = () => {
            const data = JSON.stringify({ title: node.title, questions }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (node.title.replace(/[^a-z0-9]/gi, '_') || 'questions') + '.json';
            a.click();
            URL.revokeObjectURL(url);
        };

        const importJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    if (parsed.title) onUpdateTitle(node.id, parsed.title);
                    const qs = parsed.questions || parsed;
                    if (Array.isArray(qs)) onUpdateQuestions(node.id, qs);
                } catch(err) { alert(lang === 'es' ? 'JSON inválido' : 'Invalid JSON'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        };

        const commitTitle = () => {
            const t = titleDraft.trim();
            if (t) onUpdateTitle(node.id, t);
            else setTitleDraft(node.title);
            setEditingTitle(false);
        };

        const styles = 'border-purple-400 bg-purple-50 text-purple-900 shadow-purple-100/50';

        return (
            <div
                onMouseDown={onMouseDown}
                onTouchStart={onTouchStart}
                style={{ left: node.x, top: node.y }}
                className={`absolute z-10 rounded-xl border-2 node-card shadow-lg cursor-pointer
                    w-80 ${styles} ${isDraggingThis ? 'scale-105 z-20 shadow-xl opacity-90' : ''}`}
            >
                {/* Header */}
                <div className="flex justify-between items-center px-4 pt-4 pb-2 border-b border-purple-200">
                    {editingTitle ? (
                        <input
                            ref={titleInputRef}
                            type="text"
                            value={titleDraft}
                            onChange={(e) => setTitleDraft(e.target.value)}
                            onBlur={commitTitle}
                            onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); commitTitle(); } if (e.key === 'Escape') { setTitleDraft(node.title); setEditingTitle(false); } }}
                            onMouseDown={(e) => e.stopPropagation()}
                            className="font-bold text-sm tracking-tight leading-tight flex-1 min-w-0 bg-white border border-purple-400 rounded px-1.5 py-0.5 focus:outline-none focus:ring-1 focus:ring-purple-500"
                            autoFocus
                        />
                    ) : (
                        <h3
                            className="font-bold text-sm tracking-tight leading-tight flex-1 min-w-0 truncate cursor-text hover:bg-purple-100/60 rounded px-1 -mx-1 py-0.5 transition-colors"
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => { e.stopPropagation(); setTitleDraft(node.title); setEditingTitle(true); }}
                            title={lang === 'es' ? 'Clic para editar nombre' : 'Click to edit name'}
                        >{node.title}</h3>
                    )}
                    <div className="flex items-center gap-1 ml-2 flex-none">
                        <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-purple-200 text-purple-800">questions</span>
                        <button
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => { e.stopPropagation(); exportJSON(); }}
                            className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-purple-100 hover:bg-purple-200 text-purple-700 border border-purple-300"
                            title={lang === 'es' ? 'Exportar JSON' : 'Export JSON'}
                        >↓ JSON</button>
                        <button
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => { e.stopPropagation(); importRef.current && importRef.current.click(); }}
                            className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-purple-100 hover:bg-purple-200 text-purple-700 border border-purple-300"
                            title={lang === 'es' ? 'Importar JSON' : 'Import JSON'}
                        >↑ JSON</button>
                        <input ref={importRef} type="file" accept=".json" className="hidden" onChange={importJSON} />
                        <button
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => { e.stopPropagation(); onDelete(node.id); }}
                            className="text-purple-400 hover:text-red-500 text-xs font-bold px-1"
                            title={lang === 'es' ? 'Eliminar tarjeta' : 'Delete card'}
                        >✕</button>
                    </div>
                </div>

                {/* Questions list */}
                <div
                    onMouseDown={(e) => e.stopPropagation()}
                    className="max-h-64 overflow-y-auto px-3 py-2 flex flex-col gap-1.5"
                >
                    {questions.length === 0 && (
                        <p className="text-xs text-purple-400 italic text-center py-3">
                            {lang === 'es' ? 'Sin preguntas aún. Añade una abajo.' : 'No questions yet. Add one below.'}
                        </p>
                    )}
                    {questions.map((q, idx) => (
                        <div key={q.id} className="rounded-lg border border-purple-200 bg-white/70 overflow-hidden">
                            {/* Question row */}
                            <div className="flex items-start gap-1.5 px-2 py-1.5">
                                <span className="text-[10px] font-bold text-purple-400 mt-0.5 flex-none">{idx + 1}.</span>
                                <span className="text-xs font-medium flex-1 leading-snug">{q.text}</span>
                                <div className="flex items-center gap-1 flex-none">
                                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${questionTypeBadge(q.type)}`}>
                                        {questionTypeLabel(q.type)}
                                    </span>
                                    {(q.type === 'multiple' || q.type === 'single') && (
                                        <button
                                            onClick={(e) => { e.stopPropagation(); setExpandedQ(expandedQ === q.id ? null : q.id); setNewOptionText(''); }}
                                            className="text-[10px] text-purple-500 hover:text-purple-700 font-bold px-1"
                                            title={lang === 'es' ? 'Ver/editar opciones' : 'View/edit options'}
                                        >{expandedQ === q.id ? '▲' : '▼'}</button>
                                    )}
                                    <button
                                        onClick={(e) => { e.stopPropagation(); deleteQuestion(q.id); }}
                                        className="text-[10px] text-purple-300 hover:text-red-500 font-bold px-0.5"
                                    >✕</button>
                                </div>
                            </div>
                            {/* Options panel */}
                            {expandedQ === q.id && (q.type === 'multiple' || q.type === 'single') && (
                                <div className="border-t border-purple-100 bg-purple-50/60 px-2 py-1.5 flex flex-col gap-1">
                                    {(q.options || []).length === 0 && (
                                        <p className="text-[10px] text-purple-400 italic">
                                            {lang === 'es' ? 'Sin opciones aún.' : 'No options yet.'}
                                        </p>
                                    )}
                                    {(q.options || []).map(opt => (
                                        <div key={opt.id} className="flex items-center gap-1.5">
                                            <span className="text-[10px] flex-1 leading-snug">{opt.text}</span>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); toggleQualifies(q.id, opt.id); }}
                                                className={`text-[9px] font-bold px-1.5 py-0.5 rounded border transition-colors ${
                                                    opt.qualifies
                                                        ? 'bg-emerald-100 text-emerald-700 border-emerald-300'
                                                        : 'bg-red-100 text-red-600 border-red-300'
                                                }`}
                                                title={lang === 'es' ? 'Clic para cambiar' : 'Click to toggle'}
                                            >
                                                {opt.qualifies
                                                    ? (lang === 'es' ? '✓ Califica' : '✓ Qualifies')
                                                    : (lang === 'es' ? '✗ No califica' : '✗ Disqualifies')}
                                            </button>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); deleteOption(q.id, opt.id); }}
                                                className="text-[10px] text-purple-300 hover:text-red-500 font-bold"
                                            >✕</button>
                                        </div>
                                    ))}
                                    {/* Add option input */}
                                    <div className="flex gap-1 mt-0.5">
                                        <input
                                            type="text"
                                            value={newOptionText}
                                            onChange={(e) => setNewOptionText(e.target.value)}
                                            onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addOption(q.id); } }}
                                            placeholder={lang === 'es' ? 'Nueva opción...' : 'New option...'}
                                            className="flex-1 text-[10px] border border-purple-200 rounded px-1.5 py-1 bg-white focus:outline-none focus:border-purple-400"
                                        />
                                        <button
                                            onClick={(e) => { e.stopPropagation(); addOption(q.id); }}
                                            className="text-[10px] font-bold px-2 py-1 rounded bg-purple-500 hover:bg-purple-600 text-white"
                                        >+</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>

                {/* Input area */}
                <div
                    onMouseDown={(e) => e.stopPropagation()}
                    className="border-t border-purple-200 px-3 py-2 bg-purple-50/80"
                >
                    {/* Type selector */}
                    <div className="flex flex-col gap-1 mb-1.5">
                        {/* Yes/No — full width */}
                        <button
                            onClick={(e) => { e.stopPropagation(); setQuestionType('yes_no'); }}
                            className={`w-full text-[9px] font-bold py-1 rounded border transition-colors ${
                                questionType === 'yes_no'
                                    ? 'bg-indigo-600 text-white border-indigo-600'
                                    : 'bg-white text-indigo-600 border-indigo-300 hover:bg-indigo-50'
                            }`}
                        >
                            {lang === 'es' ? '⊙ Sí / No' : '⊙ Yes / No'}
                        </button>
                        {/* Multiple choice options — side by side */}
                        <div className="flex gap-1">
                            <button
                                onClick={(e) => { e.stopPropagation(); setQuestionType('multiple'); }}
                                className={`flex-1 text-[9px] font-bold py-1.5 rounded border transition-colors flex flex-col items-center gap-0.5 ${
                                    questionType === 'multiple'
                                        ? 'bg-blue-600 text-white border-blue-600'
                                        : 'bg-white text-blue-600 border-blue-300 hover:bg-blue-50'
                                }`}
                            >
                                <span className="text-[11px] leading-none">☑</span>
                                <span>{lang === 'es' ? 'Múltiple' : 'Multiple'}</span>
                            </button>
                            <button
                                onClick={(e) => { e.stopPropagation(); setQuestionType('single'); }}
                                className={`flex-1 text-[9px] font-bold py-1.5 rounded border transition-colors flex flex-col items-center gap-0.5 ${
                                    questionType === 'single'
                                        ? 'bg-emerald-600 text-white border-emerald-600'
                                        : 'bg-white text-emerald-600 border-emerald-300 hover:bg-emerald-50'
                                }`}
                            >
                                <span className="text-[11px] leading-none">◉</span>
                                <span>{lang === 'es' ? 'Única' : 'Single'}</span>
                            </button>
                        </div>
                    </div>
                    {/* Text input + submit */}
                    <div className="flex gap-1.5">
                        <input
                            type="text"
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addQuestion(); } }}
                            placeholder={lang === 'es' ? 'Escribe una pregunta...' : 'Type a question...'}
                            className="flex-1 text-xs border border-purple-300 rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:border-purple-500 placeholder-purple-300"
                        />
                        <button
                            onClick={(e) => { e.stopPropagation(); addQuestion(); }}
                            className="flex-none text-xs font-bold px-3 py-1.5 rounded-lg bg-purple-600 hover:bg-purple-700 text-white transition-colors"
                        >
                            {lang === 'es' ? 'Añadir' : 'Add'}
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    const App = () => {
    const [lang, setLang] = useState('es');
    const [currentAssessment, setCurrentAssessment] = useState('regularizacion');
    const [nodes, setNodes] = useState(regularizacionNodes);

    const updateNodeQuestions = (nodeId, newQuestions) => {
        setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, questions: newQuestions } : n));
    };
    const [edges, setEdges] = useState(regularizacionEdges);
    const [pan, setPan] = useState({ x: 50, y: 50 });
    const [draggingNode, setDraggingNode] = useState(null);
    const [isPanning, setIsPanning] = useState(false);
    const [editingNode, setEditingNode] = useState(null);
    const [showMobileMenu, setShowMobileMenu] = useState(false);

    const startPos = useRef({ x: 0, y: 0 });
    const containerRef = useRef(null);
    const t = UI[lang];

    // Mouse interaction
    const handleMouseDown = (e, nodeId) => {
        if (nodeId) { setDraggingNode(nodeId); }
        else { setIsPanning(true); }
        startPos.current = { x: e.clientX, y: e.clientY };
    };

    const handleMouseMove = (e) => {
        if (draggingNode) {
            const dx = e.clientX - startPos.current.x;
            const dy = e.clientY - startPos.current.y;
            setNodes(prev => prev.map(n => n.id === draggingNode ? { ...n, x: n.x + dx, y: n.y + dy } : n));
            startPos.current = { x: e.clientX, y: e.clientY };
        } else if (isPanning) {
            const dx = e.clientX - startPos.current.x;
            const dy = e.clientY - startPos.current.y;
            setPan(p => ({ x: p.x + dx, y: p.y + dy }));
            startPos.current = { x: e.clientX, y: e.clientY };
        }
    };

    const handleMouseUp = () => { setDraggingNode(null); setIsPanning(false); };

    // Touch interaction
    const handleTouchStart = (e, nodeId) => {
        const touch = e.touches[0];
        if (nodeId) { setDraggingNode(nodeId); }
        else { setIsPanning(true); }
        startPos.current = { x: touch.clientX, y: touch.clientY };
    };

    const handleTouchMove = (e) => {
        if (!draggingNode && !isPanning) return;
        const touch = e.touches[0];
        if (draggingNode) {
            const dx = touch.clientX - startPos.current.x;
            const dy = touch.clientY - startPos.current.y;
            setNodes(prev => prev.map(n => n.id === draggingNode ? { ...n, x: n.x + dx, y: n.y + dy } : n));
            startPos.current = { x: touch.clientX, y: touch.clientY };
        } else if (isPanning) {
            const dx = touch.clientX - startPos.current.x;
            const dy = touch.clientY - startPos.current.y;
            setPan(p => ({ x: p.x + dx, y: p.y + dy }));
            startPos.current = { x: touch.clientX, y: touch.clientY };
        }
    };

    // Switch assessment (preserves language)
    const switchAssessment = (type, overrideLang) => {
        const activeLang = overrideLang || lang;
        setCurrentAssessment(type);
        const data = ASSESSMENTS[activeLang][type];
        setNodes(data.nodes);
        setEdges(data.edges);
        setPan({ x: 50, y: 50 });
        setShowMobileMenu(false);
    };

    // Language toggle
    const toggleLang = () => {
        const newLang = lang === 'es' ? 'en' : 'es';
        setLang(newLang);
        const data = ASSESSMENTS[newLang][currentAssessment];
        setNodes(data.nodes);
        setEdges(data.edges);
    };

    const resetView = () => { setPan({ x: 50, y: 50 }); };

    // Add an Assessment Questions node to the canvas
    const addQuestionsCard = () => {
        const id = 'questions_' + Date.now();
        const newNode = {
            id,
            x: -pan.x + 120,
            y: -pan.y + 120,
            title: lang === 'es' ? '❓ Preguntas de Assessment' : '❓ Assessment Questions',
            type: 'questions',
            questions: [],
        };
        setNodes(prev => [...prev, newNode]);
    };

    // Feature 2: Add a Post-it comment node to the canvas
    const addPostIt = () => {
        const id = 'comment_' + Date.now();
        const newNode = {
            id,
            x: -pan.x + 120,
            y: -pan.y + 120,
            title: lang === 'es' ? '📝 Nota' : '📝 Note',
            text: lang === 'es' ? 'Escribe tu comentario aquí...' : 'Write your comment here...',
            type: 'comment',
        };
        setNodes(prev => [...prev, newNode]);
    };

    // Feature 3: Simulate editing a node — adds an audit Post-it near it
    const simulateEdit = (node) => {
        if (node.type === 'comment') return; // don't audit comment nodes
        const now = new Date();
        const ts = now.toLocaleString(lang === 'es' ? 'es-ES' : 'en-GB', { dateStyle: 'short', timeStyle: 'short' });
        const auditId = 'audit_' + Date.now();
        const auditNode = {
            id: auditId,
            x: node.x + 310,
            y: node.y,
            title: lang === 'es' ? '🕐 Editado' : '🕐 Edited',
            text: (lang === 'es' ? 'Editado: ' : 'Edited: ') + ts + '\n↖ ' + node.title,
            type: 'comment',
        };
        setNodes(prev => [...prev, auditNode]);
        setEditingNode(null);
    };

    const assessmentKeys = ['regularizacion', 'nomad', 'work', 'student', 'non_lucrative', 'job_seeker'];

    return (
    <div className="w-screen h-screen flex flex-col bg-white select-none">

        {/* ── TOP TOOLBAR ── */}
        <div className="flex-none bg-white border-b border-gray-200 shadow-sm z-50">
            <div className="flex items-center justify-between px-3 sm:px-6 py-2 min-h-[56px]">

                {/* Left: title + mobile hamburger */}
                <div className="flex items-center gap-2 min-w-0">
                    <h1 className="text-base sm:text-lg font-bold text-gray-800 whitespace-nowrap">{t.appTitle}</h1>
                    {/* Mobile hamburger */}
                    <button
                        onClick={() => setShowMobileMenu(m => !m)}
                        className="sm:hidden ml-1 p-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600"
                        aria-label="Toggle menu"
                    >
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

                {/* Center: assessment tabs — hidden on mobile, shown on sm+ */}
                <div className="hidden sm:flex items-center gap-1.5 overflow-x-auto scrollbar-hide flex-1 mx-3">
                    {assessmentKeys.map(key => (
                        <button
                            key={key}
                            onClick={() => switchAssessment(key)}
                            className={`flex-none text-xs font-medium px-3 py-1 rounded-full transition-colors whitespace-nowrap ${currentAssessment === key ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >
                            {t.tabs[key]}
                        </button>
                    ))}
                </div>

                {/* Right: Reset View + Lang toggle */}
                <div className="flex items-center gap-2 flex-none">
                    <button
                        onClick={resetView}
                        className="text-xs sm:text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition-colors shadow-sm whitespace-nowrap"
                    >
                        {t.resetView}
                    </button>
                    <button
                        onClick={toggleLang}
                        className="text-xs font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 px-3 py-1.5 rounded-lg transition-colors shadow-sm"
                        title={lang === 'es' ? 'Switch to English' : 'Cambiar a Español'}
                    >
                        {t.langToggle}
                    </button>
                </div>
            </div>

            {/* Mobile dropdown menu */}
            {showMobileMenu && (
                <div className="sm:hidden border-t border-gray-100 px-3 py-2 flex flex-wrap gap-2 bg-white">
                    {assessmentKeys.map(key => (
                        <button
                            key={key}
                            onClick={() => switchAssessment(key)}
                            className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === key ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >
                            {t.tabs[key]}
                        </button>
                    ))}
                </div>
            )}
        </div>

        {/* ── CANVAS ── */}
        <div
            ref={containerRef}
            onMouseDown={(e) => handleMouseDown(e, null)}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}
            onMouseLeave={handleMouseUp}
            onTouchStart={(e) => handleTouchStart(e, null)}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleMouseUp}
            onTouchCancel={handleMouseUp}
            className={`flex-1 relative miro-bg overflow-hidden ${isPanning ? 'cursor-grabbing' : 'cursor-grab'}`}
        >
            {/* Pannable layer */}
            <div
                style={{ transform: `translate(${pan.x}px, ${pan.y}px)` }}
                className="absolute top-0 left-0 w-full h-full origin-top-left"
            >
                {/* SVG edges */}
                <svg className="absolute top-0 left-0 w-[5000px] h-[5000px] pointer-events-none z-0 overflow-visible">
                    {edges.map(edge => {
                        const sourceNode = nodes.find(n => n.id === edge.from);
                        const targetNode = nodes.find(n => n.id === edge.to);
                        if (!sourceNode || !targetNode) return null;
                        const x1 = sourceNode.x + 144, y1 = sourceNode.y + 60;
                        const x2 = targetNode.x + 144, y2 = targetNode.y + 60;
                        const path = `M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;
                        const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
                        return (
                            <g key={edge.id}>
                                <path d={path} fill="none" stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" />
                                {edge.label && (
                                    <foreignObject x={midX - 100} y={midY - 14} width="200" height="28" className="overflow-visible">
                                        <div className="flex items-center justify-center w-full h-full">
                                            <span className="bg-white border border-gray-200 text-gray-700 px-3 py-1 text-xs font-bold rounded-full shadow-sm">
                                                {edge.label}
                                            </span>
                                        </div>
                                    </foreignObject>
                                )}
                            </g>
                        );
                    })}
                </svg>

                {/* Node cards */}
                {nodes.map(node => {
                    const isComment = node.type === 'comment';
                    const isQuestions = node.type === 'questions';
                    const styles = getNodeStyles_ext(node.type);
                    const badgeStyle = getBadgeColor_ext(node.type);
                    const isDraggingThis = draggingNode === node.id;

                    if (isQuestions) {
                        return (
                            <AssessmentQuestionsCard
                                key={node.id}
                                node={node}
                                lang={lang}
                                isDraggingThis={isDraggingThis}
                                onMouseDown={(e) => { e.stopPropagation(); handleMouseDown(e, node.id); }}
                                onTouchStart={(e) => { e.stopPropagation(); handleTouchStart(e, node.id); }}
                                onDelete={(id) => setNodes(prev => prev.filter(n => n.id !== id))}
                                onUpdateQuestions={updateNodeQuestions}
                            />
                        );
                    }

                    return (
                        <div
                            key={node.id}
                            onMouseDown={(e) => { e.stopPropagation(); handleMouseDown(e, node.id); }}
                            onTouchStart={(e) => { e.stopPropagation(); handleTouchStart(e, node.id); }}
                            onDoubleClick={() => !isComment && simulateEdit(node)}
                            style={{ left: node.x, top: node.y }}
                            className={`absolute z-10 rounded-xl border-2 p-4 bg-opacity-95 backdrop-blur-sm node-card cursor-pointer shadow-lg
                                ${isComment ? 'w-52 rotate-1' : 'w-72'}
                                ${styles} ${isDraggingThis ? 'scale-105 z-20 shadow-xl opacity-90' : ''}`}
                            title={!isComment ? (lang === 'es' ? 'Doble clic para registrar edición' : 'Double-click to log edit') : ''}
                        >
                            <div className="flex justify-between items-center mb-2 border-b border-inherit pb-2">
                                <h3 className="font-bold text-sm tracking-tight leading-tight">{node.title}</h3>
                                <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${badgeStyle}`}>
                                    {node.type}
                                </span>
                            </div>
                            <div className={`text-sm opacity-90 whitespace-pre-wrap leading-relaxed font-medium ${isComment ? 'font-mono' : ''}`}>
                                {node.text}
                            </div>
                            {isComment && (
                                <button
                                    onMouseDown={(e) => e.stopPropagation()}
                                    onClick={(e) => { e.stopPropagation(); setNodes(prev => prev.filter(n => n.id !== node.id)); }}
                                    className="absolute top-1 right-1 text-yellow-600 hover:text-red-500 text-xs font-bold px-1"
                                    title={lang === 'es' ? 'Eliminar nota' : 'Delete note'}
                                >✕</button>
                            )}
                        </div>
                    );
                })}
            </div>

            {/* ── FLOATING TOOLS PANEL (left side) ── */}
            <div
                className="absolute left-3 top-1/2 -translate-y-1/2 z-40 flex flex-col gap-2"
                onMouseDown={(e) => e.stopPropagation()}
            >
                <div className="bg-white border border-gray-200 rounded-xl shadow-lg p-2 flex flex-col gap-2">
                    <span className="text-[9px] font-bold text-gray-400 uppercase text-center tracking-widest">
                        {lang === 'es' ? 'Herr.' : 'Tools'}
                    </span>
                    <button
                        onClick={addPostIt}
                        className="flex flex-col items-center gap-0.5 p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100 border border-yellow-200 transition-colors"
                        title={lang === 'es' ? 'Añadir nota Post-it' : 'Add Post-it note'}
                    >
                        <span className="text-lg">📝</span>
                        <span className="text-[9px] font-semibold text-yellow-800">
                            {lang === 'es' ? 'Nota' : 'Note'}
                        </span>
                    </button>
                    <button
                        onClick={addQuestionsCard}
                        className="flex flex-col items-center gap-0.5 p-2 rounded-lg bg-purple-50 hover:bg-purple-100 border border-purple-200 transition-colors"
                        title={lang === 'es' ? 'Añadir tarjeta de preguntas' : 'Add assessment questions card'}
                    >
                        <span className="text-lg">❓</span>
                        <span className="text-[9px] font-semibold text-purple-800">
                            {lang === 'es' ? 'Preguntas' : 'Questions'}
                        </span>
                    </button>
                    <button
                        onClick={resetView}
                        className="flex flex-col items-center gap-0.5 p-2 rounded-lg bg-gray-50 hover:bg-gray-100 border border-gray-200 transition-colors"
                        title={t.resetView}
                    >
                        <span className="text-lg">🏠</span>
                        <span className="text-[9px] font-semibold text-gray-600">
                            {lang === 'es' ? 'Vista' : 'View'}
                        </span>
                    </button>
                </div>
            </div>

            {/* Canvas hint badge */}
            <div className="canvas-hint">{t.hint}</div>
        </div>
    </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
