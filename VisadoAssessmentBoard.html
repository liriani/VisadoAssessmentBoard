    { id: 'nl_q3', x: 600, y: 500, title: 'Filtro 3: Medios Económicos', text: '¿Dispone de ingresos pasivos, rentas, pensiones o ahorros propios garantizados que superen el 400% del IPREM mensual durante 1 año (aprox. 28.800€/año), más 100% extra por cada familiar?', type: 'filter' },
    { id: 'nl_fail_3', x: 1000, y: 500, title: '❌ Fondos Insuficientes o Inválidos', text: 'Debe demostrar solvencia sostenida sin depender de un salario actual. Las nóminas de empleo remoto activo no son válidas para esta vía.', type: 'error' },

    { id: 'nl_q4', x: 600, y: 650, title: 'Filtro 4: Salud y Penales', text: '¿Tiene seguro médico español privado integral (sin copagos ni carencias), Certificado Médico (RSI 2005) y carece de antecedentes penales en los últimos 5 años?', type: 'filter' },
    { id: 'nl_fail_4', x: 1000, y: 650, title: '❌ Denegación Asegurada', text: 'Los seguros de viaje o con franquicias/copagos son automáticamente rechazados por el consulado. Los antecedentes también bloquean el trámite.', type: 'error' },

    { id: 'nl_succ', x: 600, y: 850, title: '✅ Checklist: Visado No Lucrativa', text: '• Formulario EX-01 y Formulario Consular\n• Pasaporte en vigor (mín. 1 año de validez)\n• Certificado Penales Apostillado/Legalizado\n• Cert. Médico (Reglamento Sanitario Int. 2005)\n• Seguro Médico Español (cobertura total y repatriación preferiblemente)\n• Demostración económica (extractos bancarios de 6-12 meses, certificados de pensiones, rentas de alquiler, dividendos)\n• Tasas consulares y Modelo 790 código 052', type: 'result' },
    ];

    const nonLucrativeEdges = [
    { id: 'e_nl_s_q1', from: 'start_nl', to: 'nl_q1', label: 'Iniciar' },

    { id: 'e_nl_q1_q2', from: 'nl_q1', to: 'nl_q2', label: 'SÍ' },
    { id: 'e_nl_q1_f', from: 'nl_q1', to: 'nl_fail_1', label: 'NO (En España)' },

    { id: 'e_nl_q2_q3', from: 'nl_q2', to: 'nl_q3', label: 'SÍ' },
    { id: 'e_nl_q2_f', from: 'nl_q2', to: 'nl_fail_2', label: 'NO' },

    { id: 'e_nl_q3_q4', from: 'nl_q3', to: 'nl_q4', label: 'SÍ' },
    { id: 'e_nl_q3_f', from: 'nl_q3', to: 'nl_fail_3', label: 'NO' },

    { id: 'e_nl_q4_suc', from: 'nl_q4', to: 'nl_succ', label: 'SÍ' },
    { id: 'e_nl_q4_f', from: 'nl_q4', to: 'nl_fail_4', label: 'NO' },
    ];

    // ============================================================================
    // DATOS DEL ASSESSMENT: BÚSQUEDA DE EMPLEO
    // ============================================================================

    const jobSeekerNodes = [
    { id: 'start_js', x: 600, y: 50, title: 'INICIO: Búsqueda de Empleo', text: 'Permisos para buscar trabajo en España\n(Estudiantes o Hijos/Nietos de Españoles)', type: 'start' },

    { id: 'js_q1', x: 600, y: 200, title: 'Filtro 1: Perfil del Solicitante', text: '¿Pertenece a alguno de estos grupos?\n1. Estudiante en España a punto de graduarse o recién graduado.\n2. Hijo o nieto de español de origen residente en el extranjero.', type: 'filter' },
    { id: 'js_fail_1', x: 1000, y: 200, title: '❌ No Elegible (Vía Directa)', text: 'Si no es estudiante recién graduado en España ni descendiente de español, no existe un "visado de búsqueda de empleo" genérico. Debe conseguir una oferta de trabajo desde su país.', type: 'error' },

    { id: 'js_branch', x: 600, y: 350, title: 'Bifurcación de Vías', text: 'Seleccione su perfil específico:', type: 'branch' },

    // Ruta Estudiantes (Ley de Emprendedores)
    { id: 'js_qa_1', x: 250, y: 500, title: 'Filtro: Nivel de Estudios', text: '¿Ha superado los estudios en una Institución de Educación Superior (Nivel mínimo 6: Grado, Máster o Doctorado) en España?', type: 'filter' },
    { id: 'js_qa_fail_1', x: -100, y: 500, title: '❌ Nivel Insuficiente', text: 'Los cursos de idiomas, certificados de profesionalidad o grados medios/superiores (FP) no dan acceso a este permiso específico. Deben ser estudios universitarios/superiores.', type: 'error' },

    { id: 'js_qa_2', x: 250, y: 650, title: 'Filtro: Medios y Seguro', text: '¿Dispone de seguro médico (sin copagos) y fondos suficientes (100% IPREM, aprox. 600€/mes) para mantenerse durante 12 meses sin trabajar?', type: 'filter' },
    { id: 'js_qa_fail_2', x: -100, y: 650, title: '❌ Fondos/Seguro Insuficiente', text: 'Es obligatorio demostrar solvencia económica y cobertura sanitaria mientras se busca empleo.', type: 'error' },

    { id: 'js_succ_a', x: 250, y: 850, title: '✅ Checklist: Residencia Búsqueda Empleo (Estudiantes)', text: 'Trámite desde España (dentro de los 60 días previos a caducar NIE o 90 días posteriores):\n• Formulario EX-01\n• Título universitario o certificado de haber superado los estudios\n• Seguro médico sin carencias/copagos\n• Extractos bancarios (Solvencia 100% IPREM x 12 meses)\n• Tasa 052 (Epígrafe 2.1)\n\n*Nota: Dura 12 meses (24m en algunas CCAA). Si encuentra empleo, se modifica a residencia y trabajo.*', type: 'result' },

    // Ruta Descendientes de Españoles
    { id: 'js_qb_1', x: 950, y: 500, title: 'Filtro: Solicitud Consular', text: '¿Se encuentra en su país de residencia legal y puede demostrar documentalmente su vínculo como hijo o nieto de un español de origen?', type: 'filter' },
    { id: 'js_qb_fail_1', x: 1350, y: 500, title: '❌ No Elegible', text: 'Debe aplicar obligatoriamente desde el Consulado de España en su demarcación presentando los certificados de nacimiento correspondientes.', type: 'error' },

    { id: 'js_succ_b', x: 950, y: 850, title: '✅ Checklist: Visado Búsqueda Empleo (Descendientes)', text: 'Trámite en Consulado de origen:\n• Formulario Visado Nacional\n• Pasaporte en vigor\n• Certificado de Nacimiento del solicitante (Apostillado)\n• Certificado de Nacimiento del ascendiente (Padre/Madre/Abuelo español de origen)\n• Certificado Antecedentes Penales\n• Certificado Médico\n• Tasa consular\n\n*Nota: Concede un visado de 3 meses para viajar a España. Si encuentra empleo, tramita la residencia desde España sin tener que regresar.*', type: 'result' },
    ];

    const jobSeekerEdges = [
    { id: 'e_js_start_q1', from: 'start_js', to: 'js_q1', label: 'Iniciar' },

    { id: 'e_js_q1_b', from: 'js_q1', to: 'js_branch', label: 'SÍ' },
    { id: 'e_js_q1_f', from: 'js_q1', to: 'js_fail_1', label: 'NO' },

    { id: 'e_js_b_a', from: 'js_branch', to: 'js_qa_1', label: 'Estudiante (Grado/Máster/Doctorado en España)' },
    { id: 'e_js_b_b', from: 'js_branch', to: 'js_qb_1', label: 'Hijo/Nieto de Español de Origen' },

    // Lógica Estudiante
    { id: 'e_js_qa1_qa2', from: 'js_qa_1', to: 'js_qa_2', label: 'SÍ' },
    { id: 'e_js_qa1_f', from: 'js_qa_1', to: 'js_qa_fail_1', label: 'NO' },
    { id: 'e_js_qa2_suc', from: 'js_qa_2', to: 'js_succ_a', label: 'SÍ' },
    { id: 'e_js_qa2_f', from: 'js_qa_2', to: 'js_qa_fail_2', label: 'NO' },

    // Lógica Descendientes
    { id: 'e_js_qb1_suc', from: 'js_qb_1', to: 'js_succ_b', label: 'SÍ' },
    { id: 'e_js_qb1_f', from: 'js_qb_1', to: 'js_qb_fail_1', label: 'NO' },
    ];


    // Helpers visuales para colorear los bloques según su tipo
    const getNodeStyles = (type) => {
    switch(type) {
    case 'start': return 'border-indigo-400 bg-indigo-50 text-indigo-900 shadow-indigo-100/50';
    case 'filter': return 'border-amber-400 bg-amber-50 text-amber-900 shadow-amber-100/50';
    case 'error': return 'border-red-400 bg-red-50 text-red-900 shadow-red-100/50';
    case 'branch': return 'border-blue-400 bg-blue-50 text-blue-900 shadow-blue-100/50';
    case 'result': return 'border-emerald-400 bg-emerald-50 text-emerald-900 shadow-emerald-100/50';
    default: return 'border-gray-400 bg-white text-gray-900 shadow-gray-100/50';
}
};

    const getBadgeColor = (type) => {
    switch(type) {
    case 'start': return 'bg-indigo-200 text-indigo-800';
    case 'filter': return 'bg-amber-200 text-amber-800';
    case 'error': return 'bg-red-200 text-red-800';
    case 'branch': return 'bg-blue-200 text-blue-800';
    case 'result': return 'bg-emerald-200 text-emerald-800';
    default: return 'bg-gray-200 text-gray-800';
}
};

    const App = () => {
    const [currentAssessment, setCurrentAssessment] = useState('regularizacion');
    const [nodes, setNodes] = useState(regularizacionNodes);
    const [edges, setEdges] = useState(regularizacionEdges);
    const [pan, setPan] = useState({ x: 50, y: 50 }); // Offset inicial
    const [draggingNode, setDraggingNode] = useState(null);
    const [isPanning, setIsPanning] = useState(false);

    const startPos = useRef({ x: 0, y: 0 });
    const containerRef = useRef(null);

    // Funciones de interacción con Ratón (Mouse)
    const handleMouseDown = (e, nodeId) => {
    if (nodeId) {
    setDraggingNode(nodeId);
} else {
    setIsPanning(true);
}
    startPos.current = { x: e.clientX, y: e.clientY };
};

    const handleMouseMove = (e) => {
    if (draggingNode) {
    const dx = e.clientX - startPos.current.x;
    const dy = e.clientY - startPos.current.y;
    setNodes(nodes.map(n => n.id === draggingNode ? { ...n, x: n.x + dx, y: n.y + dy } : n));
    startPos.current = { x: e.clientX, y: e.clientY };
} else if (isPanning) {
    const dx = e.clientX - startPos.current.x;
    const dy = e.clientY - startPos.current.y;
    setPan({ x: pan.x + dx, y: pan.y + dy });
    startPos.current = { x: e.clientX, y: e.clientY };
}
};

    const handleMouseUp = () => {
    setDraggingNode(null);
    setIsPanning(false);
};

    // Funciones de interacción Táctil (Mobile/Tablets)
    const handleTouchStart = (e, nodeId) => {
    const touch = e.touches[0];
    if (nodeId) {
    setDraggingNode(nodeId);
} else {
    setIsPanning(true);
}
    startPos.current = { x: touch.clientX, y: touch.clientY };
};

    const handleTouchMove = (e) => {
    if (!draggingNode && !isPanning) return;
    const touch = e.touches[0];

    if (draggingNode) {
    const dx = touch.clientX - startPos.current.x;
    const dy = touch.clientY - startPos.current.y;
    setNodes(nodes.map(n => n.id === draggingNode ? { ...n, x: n.x + dx, y: n.y + dy } : n));
    startPos.current = { x: touch.clientX, y: touch.clientY };
} else if (isPanning) {
    const dx = touch.clientX - startPos.current.x;
    const dy = touch.clientY - startPos.current.y;
    setPan({ x: pan.x + dx, y: pan.y + dy });
    startPos.current = { x: touch.clientX, y: touch.clientY };
}
};

    const switchAssessment = (type) => {
    setCurrentAssessment(type);
    if (type === 'regularizacion') {
    setNodes(regularizacionNodes);
    setEdges(regularizacionEdges);
    setPan({ x: 50, y: 50 });
} else if (type === 'nomad') {
    setNodes(nomadNodes);
    setEdges(nomadEdges);
    setPan({ x: 50, y: 50 });
} else if (type === 'work') {
    setNodes(workNodes);
    setEdges(workEdges);
    setPan({ x: 50, y: 50 });
} else if (type === 'student') {
    setNodes(studentNodes);
    setEdges(studentEdges);
    setPan({ x: 50, y: 50 });
} else if (type === 'non_lucrative') {
    setNodes(nonLucrativeNodes);
    setEdges(nonLucrativeEdges);
    setPan({ x: 50, y: 50 });
} else if (type === 'job_seeker') {
    setNodes(jobSeekerNodes);
    setEdges(jobSeekerEdges);
    setPan({ x: 50, y: 50 });
}
};

    const resetView = () => {
    setPan({ x: 50, y: 50 });
    // No reseteamos los nodos a default para no perder los movimientos del usuario durante su sesion
};

    return (
    <div className="w-screen h-screen flex flex-col bg-white select-none">
{/* Barra de Herramientas Superior */}
    <div className="flex-none min-h-16 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 z-50 py-2">
        <div>
            <h1 className="text-lg font-bold text-gray-800">Visualizador Assessment</h1>
            {}
            <div className="flex flex-wrap items-center gap-2 mt-1">
                <button
                    onClick={() => switchAssessment('regularizacion')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'regularizacion' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    Reg. Extraordinaria 2026
                </button>
                <button
                    onClick={() => switchAssessment('nomad')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'nomad' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    Nómada Digital
                </button>
                <button
                    onClick={() => switchAssessment('work')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'work' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    Trabajo
                </button>
                <button
                    onClick={() => switchAssessment('student')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'student' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    Visado Estudios
                </button>
                <button
                    onClick={() => switchAssessment('non_lucrative')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'non_lucrative' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    No Lucrativa
                </button>
                <button
                    onClick={() => switchAssessment('job_seeker')}
                    className={`text-xs font-medium px-3 py-1 rounded-full transition-colors ${currentAssessment === 'job_seeker' ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                >
                    Búsqueda Empleo
                </button>
            </div>
        </div>
        <div className="flex items-center space-x-4 ml-4">
            <button
                onClick={resetView}
                className="hidden lg:inline-block text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg transition-colors shadow-sm"
            >
                Restaurar Vista
            </button>
        </div>
    </div>

    {/* Espacio de Trabajo (Canvas Pizarra) */}
    <div
        ref={containerRef}
        onMouseDown={(e) => handleMouseDown(e, null)}
        onMouseMove={handleMouseMove}
        onMouseUp={handleMouseUp}
        onMouseLeave={handleMouseUp}
        onTouchStart={(e) => handleTouchStart(e, null)}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleMouseUp}
        onTouchCancel={handleMouseUp}
        className={`flex-1 relative miro-bg overflow-hidden ${isPanning ? 'cursor-grabbing' : 'cursor-grab'}`}
    >
        {/* Contenedor desplazable mediante el estado 'pan' */}
        <div
            style={{ transform: `translate(${pan.x}px, ${pan.y}px)` }}
            className="absolute top-0 left-0 w-full h-full origin-top-left"
        >

            {/* Capa SVG para las Líneas (Edges) */}
            <svg className="absolute top-0 left-0 w-[5000px] h-[5000px] pointer-events-none z-0 overflow-visible">
                {edges.map(edge => {
                    const sourceNode = nodes.find(n => n.id === edge.from);
                    const targetNode = nodes.find(n => n.id === edge.to);

                    if (!sourceNode || !targetNode) return null;

                    // Calculamos un centro aproximado para los bloques (ancho: 288px / alto aprox: 100px)
                    const x1 = sourceNode.x + 144;
                    const y1 = sourceNode.y + 60;
                    const x2 = targetNode.x + 144;
                    const y2 = targetNode.y + 60;

                    // Dibujamos una curva Bezier suave (S-curve) entre los nodos
                    const path = `M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;

                    // Punto medio para la etiqueta (label)
                    const midX = (x1 + x2) / 2;
                    const midY = (y1 + y2) / 2;

                    return (
                        <g key={edge.id}>
                            <path
                                d={path}
                                fill="none"
                                stroke="#94a3b8"
                                strokeWidth="3"
                                strokeLinecap="round"
                            />
                            {edge.label && (
                                // foreignObject permite renderizar HTML dentro del SVG
                                <foreignObject x={midX - 100} y={midY - 14} width="200" height="28" className="overflow-visible">
                                    <div className="flex items-center justify-center w-full h-full">
                                                        <span className="bg-white border border-gray-200 text-gray-700 px-3 py-1 text-xs font-bold rounded-full shadow-sm">
                                                            {edge.label}
                                                        </span>
                                    </div>
                                </foreignObject>
                            )}
                        </g>
                    );
                })}
            </svg>

            {/* Capa DIV para las Tarjetas (Nodes) */}
            {nodes.map(node => {
                const styles = getNodeStyles(node.type);
                const badgeStyle = getBadgeColor(node.type);
                const isDraggingThis = draggingNode === node.id;

                return (
                    <div
                        key={node.id}
                        onMouseDown={(e) => { e.stopPropagation(); handleMouseDown(e, node.id); }}
                        onTouchStart={(e) => { e.stopPropagation(); handleTouchStart(e, node.id); }}
                        style={{ left: node.x, top: node.y }}
                        className={`absolute z-10 w-72 rounded-xl border-2 p-4 bg-opacity-95 backdrop-blur-sm node-card cursor-pointer shadow-lg
                                                    ${styles} ${isDraggingThis ? 'scale-105 z-20 shadow-xl opacity-90' : ''}`}
                    >
                        <div className="flex justify-between items-center mb-3 border-b border-inherit pb-2">
                            <h3 className="font-bold text-sm tracking-tight leading-tight">{node.title}</h3>
                            <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${badgeStyle}`}>
                                                {node.type}
                                            </span>
                        </div>
                        <div className="text-sm opacity-90 whitespace-pre-wrap leading-relaxed font-medium">
                            {node.text}
                        </div>
                    </div>
                );
            })}
        </div>
    </div>
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
